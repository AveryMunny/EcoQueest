<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EcoQuest 🌱</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>EcoQuest 🌱</h1>
  <p>
    Move with <strong>W A S D</strong> or arrow keys. Press <strong>Space</strong> to collect.
  </p>

  <div id="hud">
    <div>🌍 Ecosystem Health: <span id="eco"></span></div>
    <div>🔋 Energy: <span id="energy"></span></div>
    <div>🥕 Food: <span id="food"></span></div>
    <div>🪵 Wood: <span id="wood"></span></div>
    <div>🪨 Coal: <span id="coal"></span></div>
  </div>

  <button id="resetBtn">Reset World</button>

  <div id="grid"></div>

  <script src="main.js"></script>
</body>
</html>
